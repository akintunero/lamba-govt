openapi: 3.0.3
info:
  title: Lamba Reporting Service API
  version: 1.0.0
  description: Aggregated reporting and compliance analytics
servers:
  - url: /api/v1/reports
paths:
  /citizens/statistics:
    get:
      summary: Citizen population statistics
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Citizen statistics report
  /documents/processing:
    get:
      summary: Document processing metrics
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Document processing report
  /compliance/summary:
    get:
      summary: Compliance summary
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Compliance report
  /audit/summary:
    get:
      summary: Audit activity summary
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Audit summary report
  /health/services:
    get:
      summary: Service health summary
      tags: [Reports]
      responses:
        '200':
          description: Service health report
  /generate:
    post:
      summary: Generate custom report
      tags: [Reports]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string }
                title: { type: string }
      responses:
        '201':
          description: Report generated
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
